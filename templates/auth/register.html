{% extends 'base.html' %}
{% load static crispy_forms_tags %}

{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="auth-card">
          <!-- Logo & Header -->
          <div class="text-center mb-4">
            <img src="{% static 'img/logo.png' %}" alt="Mithila Gold Logo" class="auth-logo mb-3">
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted small">Register as a user to track orders & get receipts</p>
          </div>

          <form action="{% url 'store:register' %}" method="post">
            {% csrf_token %}
            {% crispy form %}
          </form>

          <div class="text-center mt-4">
            <p class="text-muted mb-0">Already have an account?
              <a href="{% url 'store:login' %}" class="text-warning fw-bold">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
